version: 1
name: current-delivery

defaults:
  runner: auto
  model: middle
  effort: middle

inputs:
  task:
    type: string
    required: true
    default: ""
    custom: true
  task_id:
    type: string
    required: false
    default: ""
    custom: true
  target_branch:
    type: string
    required: false
    default: ""
    custom: true
  namespace:
    type: string
    required: false
    default: ""
    custom: true
  service:
    type: string
    required: false
    default: ""
    custom: true
  tags:
    type: array
    required: false
    default: []
    multi: true
    custom: true
  extra_params:
    type: object
    required: false
    default: {}
    custom: true

stages:
  architect:
    runner: codex
    model: medium
    effort: medium
    retry_limit: 2
    agent:
      prompt: agents/architect/prompt.md
      output_schema: agents/architect/output.schema.json
    in:
      task: input.task
      jira: integration.jira.issue
      shared_context: context.shared
    out:
      architecture_plan:
        type: object

  developer:
    runner: codex
    model: high
    effort: medium
    retry_limit: 2
    agent:
      prompt: agents/developer/prompt.md
      output_schema: agents/developer/output.schema.json
    in:
      task: input.task
      architecture_plan: stage.architect.out.architecture_plan
      shared_context: context.shared
    out:
      code_changes:
        type: object

  test_developer:
    runner: codex
    model: middle
    effort: high
    retry_limit: 2
    agent:
      prompt: agents/test_developer/prompt.md
      output_schema: agents/test_developer/output.schema.json
    in:
      task: input.task
      code_changes: stage.developer.out.code_changes
      shared_context: context.shared
    out:
      tests:
        type: object

  qa_local:
    runner: codex
    model: middle
    effort: middle
    retry_limit: 2
    agent:
      prompt: agents/qa_local/prompt.md
      output_schema: agents/qa_local/output.schema.json
    in:
      task: input.task
      tests: stage.test_developer.out.tests
      code_changes: stage.developer.out.code_changes
      shared_context: context.shared
    out:
      qa_report:
        type: object

  release:
    runner: codex
    model: low
    effort: low
    retry_limit: 1
    agent:
      prompt: agents/release/prompt.md
      output_schema: agents/release/output.schema.json
    in:
      qa_report: stage.qa_local.out.qa_report
      release_inputs.branch: runtime.git.current_branch
      release_inputs.target_branch: input.target_branch
      release_inputs.namespace: input.namespace
      release_inputs.service: input.service
      release_inputs.extra_params: input.extra_params
    out:
      release_metadata:
        type: object

  qa_stand:
    runner: codex
    model: middle
    effort: middle
    retry_limit: 1
    agent:
      prompt: agents/qa_stand/prompt.md
      output_schema: agents/qa_stand/output.schema.json
    in:
      release_metadata: stage.release.out.release_metadata
      shared_context: context.shared
    out:
      stand_verification:
        type: object

routing:
  start_stage: architect
  by_stage:
    architect:
      next_stages:
        - stage: developer
          default: true
    developer:
      next_stages:
        - stage: test_developer
          default: true
    test_developer:
      next_stages:
        - stage: qa_local
          default: true
    qa_local:
      next_stages:
        - stage: release
          default: true
    release:
      next_stages:
        - stage: qa_stand
          default: true
    qa_stand:
      next_stages:
        - stage: completed
          default: true
