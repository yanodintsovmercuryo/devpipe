# Place this file as .devpipe/config.yaml in the acquiring repository root.

defaults:
  runner: codex
  service: acquiring
  tags:
    - go
    - exchange_buy

available:
  target_branch:
    - u1
    - u1-1
    - u1-4
  namespace:
    - acquiring-u1
    - acquiring-u1-1
    - acquiring-u1-4

tag_params:
  exchange_buy:
    defaults:
      dataset: s4-3ds
    available:
      dataset:
        - s4-3ds
        - s4-no3ds
        - s4-3ds-recurrent
