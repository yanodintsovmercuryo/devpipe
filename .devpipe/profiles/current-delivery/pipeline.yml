version: 1
name: current-delivery

defaults:
  runner: auto
  model: middle
  effort: middle

inputs:
  task:
    type: string
    required: true
  task_id:
    type: string
    required: false
  target_branch:
    type: string
    required: false
  namespace:
    type: string
    required: false
  service:
    type: string
    required: false
  tags:
    type: array
    required: false
    default: []
  extra_params:
    type: object
    required: false
    default: {}

roles:
  architect:
    runner: codex
    model: medium
    effort: medium
    retry_limit: 2
    agent:
      prompt: agents/architect/prompt.md
      output_schema: agents/architect/output.schema.json
    requires:
      - input.task
    consumes:
      task: input.task
      jira: integration.jira.issue
      shared_context: context.shared
    produces:
      architecture_plan: output.architecture_plan

  developer:
    runner: codex
    model: high
    effort: middle
    retry_limit: 2
    agent:
      prompt: agents/developer/prompt.md
      output_schema: agents/developer/output.schema.json
    requires:
      - input.task
      - role.architect.output.architecture_plan
    consumes:
      task: input.task
      architecture_plan: role.architect.output.architecture_plan
      shared_context: context.shared
    produces:
      code_changes: output.code_changes

  test_developer:
    runner: codex
    model: middle
    effort: high
    retry_limit: 2
    agent:
      prompt: agents/test_developer/prompt.md
      output_schema: agents/test_developer/output.schema.json
    requires:
      - input.task
      - role.developer.output.code_changes
    consumes:
      task: input.task
      code_changes: role.developer.output.code_changes
      shared_context: context.shared
    produces:
      tests: output.tests

  qa_local:
    runner: codex
    model: middle
    effort: middle
    retry_limit: 2
    agent:
      prompt: agents/qa_local/prompt.md
      output_schema: agents/qa_local/output.schema.json
    requires:
      - input.task
      - role.test_developer.output.tests
      - role.developer.output.code_changes
    consumes:
      task: input.task
      tests: role.test_developer.output.tests
      code_changes: role.developer.output.code_changes
      shared_context: context.shared
    produces:
      qa_report: output.qa_report

  release:
    runner: codex
    model: low
    effort: low
    retry_limit: 1
    agent:
      prompt: agents/release/prompt.md
      output_schema: agents/release/output.schema.json
    requires:
      - role.qa_local.output.qa_report
      - input.target_branch
      - input.namespace
      - input.service
    consumes:
      qa_report: role.qa_local.output.qa_report
      release_inputs.branch: runtime.git.current_branch
      release_inputs.target_branch: input.target_branch
      release_inputs.namespace: input.namespace
      release_inputs.service: input.service
      release_inputs.extra_params: input.extra_params
      shared_context: context.shared
    produces:
      release_metadata: output.release_metadata

  qa_stand:
    runner: codex
    model: middle
    effort: middle
    retry_limit: 1
    agent:
      prompt: agents/qa_stand/prompt.md
      output_schema: agents/qa_stand/output.schema.json
    requires:
      - role.release.output.release_metadata
    consumes:
      release_metadata: role.release.output.release_metadata
      shared_context: context.shared
    produces:
      stand_verification: output.stand_verification

flow:
  start: architect
  transitions:
    architect:
      on_success: developer
      on_failure: failed
    developer:
      on_success: test_developer
      on_failure: failed
    test_developer:
      on_success: qa_local
      on_failure: failed
    qa_local:
      on_success: release
      on_failure: failed
    release:
      on_success: qa_stand
      on_failure: failed
    qa_stand:
      on_success: completed
      on_failure: failed
